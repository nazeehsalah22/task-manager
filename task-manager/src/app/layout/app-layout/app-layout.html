<div class="app-root-container">
  <mat-toolbar color="primary" class="app-toolbar">
    <div class="toolbar-left-side">
      <button mat-icon-button (click)="toggleSidenav()" class="hamburger-btn">
        <mat-icon>menu</mat-icon>
      </button>
      <div class="logo">
        <div class="icon">
          <img src="./icons/nav_icon.png" alt="Logo">
        </div>
        <span>Task Manager</span>
      </div>
    </div>

    <mat-form-field appearance="outline" class="global-search-input" [class.hidden-mobile]="isMobile()">
      <mat-icon matPrefix>search</mat-icon>
      <input matInput placeholder="Search tasks..." [ngModel]="searchService.searchTerm()"
        (ngModelChange)="searchService.searchTerm.set($event)">
      @if (searchService.searchTerm()) {
      <button matSuffix mat-icon-button aria-label="Clear" (click)="searchService.searchTerm.set('')">
        <mat-icon>close</mat-icon>
      </button>
      }
    </mat-form-field>

    <div class="profile-area">
      <button mat-icon-button aria-label="Notifications" class="notifcation-icon">
        <img src="./icons/notifcation.png" alt="Logo">
      </button>
      <button mat-fab extended color="accent" class="user-avatar" disabled>JD</button>
    </div>
  </mat-toolbar>

  <mat-sidenav-container class="app-sidenav-container">
    <mat-sidenav 
      [mode]="isMobile() ? 'over' : 'side'" 
      [opened]="sidenavOpen()" 
      (closedStart)="sidenavOpen.set(false)"
      class="app-sidebar">
      <app-sidebar></app-sidebar>
    </mat-sidenav>
    <mat-sidenav-content class="app-main-content">
      <main class="content-wrapper">
        <router-outlet></router-outlet>
      </main>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
